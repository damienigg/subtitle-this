name: Publish container images

on:
  # Trigger only on release tags. Our release flow (see CHANGELOG +
  # the saved memory rule "every release needs a GitHub tag") always
  # pushes a v*.*.* tag right after `git push origin main`, so a single
  # tag-triggered build covers every shippable commit. Adding
  # `branches: [main]` here would double-build every release (one for
  # the commit push, one for the tag push) since both refs point at
  # the same SHA — wasteful and confusing in the Actions UI.
  #
  # If you need a build for a non-release commit (e.g. testing a WIP
  # branch's Dockerfile changes), use the `workflow_dispatch` trigger
  # below from the Actions tab.
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subtitle-this
  # GHCR retention. Buildx publishes a multi-platform OCI image index plus
  # one sub-manifest per platform PLUS an attestation manifest — that's
  # 3 GHCR "versions" per build (index + amd64 + attestation). With CPU
  # and OpenVINO flavors we get 6 versions per push. Set the keep
  # threshold high enough to retain the most recent COMPLETE set of
  # references; pruning too aggressively breaks the index because GHCR
  # deletes the platform-specific sub-manifests it points at, leaving
  # the moving `:cpu`/`:openvino` tags resolving to a broken index that
  # docker pull rejects with "manifest unknown".
  #
  # 12 = 2 most-recent main-branch builds × (1 index + 1 amd64 + 1
  # attestation) × 2 flavors. Add a safety margin if you want a
  # rollback buffer (e.g. 24 = 4 builds).
  KEEP_LATEST_N_VERSIONS: '12'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cpu
            dockerfile: Dockerfile
          - flavor: openvino
            dockerfile: Dockerfile.openvino

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space (OpenVINO image is large)
        if: matrix.flavor == 'openvino'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Moving 'cpu' / 'openvino' pointer. Pre-0.7.29 this was
            # gated on is_default_branch (i.e. main-branch pushes), but
            # we dropped the main-branch trigger to kill the double-
            # build. Since the workflow now only fires on release tags,
            # bumping the moving tag unconditionally on every run is
            # both correct (release tags ARE the moving target) and
            # avoids `docker compose pull` getting a stale image.
            type=raw,value=${{ matrix.flavor }}
            # Versioned tags on releases: v1.2.3 -> 1.2.3-cpu / 1.2.3-openvino
            type=semver,pattern={{version}},suffix=-${{ matrix.flavor }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.flavor }}
            # Always-on SHA tag for traceability
            type=sha,prefix=${{ matrix.flavor }}-,format=short
          labels: |
            org.opencontainers.image.title=subtitle-this
            org.opencontainers.image.description=Speech-to-text + LLM translation service for Emby, Jellyfin, and Plex (${{ matrix.flavor }} flavor)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}

  prune-old-versions:
    name: Prune old GHCR versions
    needs: build-and-push
    runs-on: ubuntu-latest
    # Run on every tag-triggered build (workflow_dispatch pruning would
    # also be reasonable but we only run dispatch for one-off WIP
    # tests, where we don't want pruning to happen).
    # The ignore-versions regex below protects all release-tagged
    # images, so this is safe to run on every release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
    steps:
      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: subtitle-this
          package-type: container
          # See KEEP_LATEST_N_VERSIONS env var for the rationale on why
          # this is 12 (not 2): buildx images produce 3 GHCR versions
          # per build (index + amd64 manifest + attestation), and
          # pruning the platform-specific manifests breaks the indices
          # that point to them.
          min-versions-to-keep: ${{ fromJSON(env.KEEP_LATEST_N_VERSIONS) }}
          # Protect from deletion:
          # - bare moving tags: cpu, openvino. The previous regex
          #   required digits at the start, so the moving tags were
          #   only safe via recency (top-12). On any aggressive prune
          #   they could be wiped. Now anchored explicitly.
          # - release-versioned containers: 0.7.28-cpu, 0.7-openvino,
          #   1.2.3-cpu, etc. Pinned references users may pull against.
          # - bare semver tags: v0.7.28 (defensive; not currently used
          #   as container tags but harmless to allow).
          ignore-versions: '^(cpu|openvino)$|^v?\d+\.\d+(\.\d+)?(-(cpu|openvino))?$'
