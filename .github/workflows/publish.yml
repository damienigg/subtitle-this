name: Publish container images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subtitle-this
  # GHCR retention. After every successful build we prune the package so
  # only the most recent N versions stay online — old SHA-pinned versions
  # accumulate disk fast (the openvino image alone is several GB). Versions
  # tagged with a release semver (e.g. 1.2.3-openvino) are protected by
  # ignore-versions and never deleted regardless of count.
  KEEP_LATEST_N_VERSIONS: '2'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cpu
            dockerfile: Dockerfile
          - flavor: openvino
            dockerfile: Dockerfile.openvino

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space (OpenVINO image is large)
        if: matrix.flavor == 'openvino'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Moving 'cpu' / 'openvino' pointer on the default branch
            type=raw,value=${{ matrix.flavor }},enable={{is_default_branch}}
            # Versioned tags on releases: v1.2.3 -> 1.2.3-cpu / 1.2.3-openvino
            type=semver,pattern={{version}},suffix=-${{ matrix.flavor }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.flavor }}
            # Always-on SHA tag for traceability
            type=sha,prefix=${{ matrix.flavor }}-,format=short
          labels: |
            org.opencontainers.image.title=subtitle-this
            org.opencontainers.image.description=Speech-to-text + LLM translation service for Emby, Jellyfin, and Plex (${{ matrix.flavor }} flavor)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}

  prune-old-versions:
    name: Prune old GHCR versions
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only prune on main-branch pushes — when the user tags a release we
    # WANT to keep older versions around for reproducibility.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: subtitle-this
          package-type: container
          # Versions sorted newest-first; this many of the newest are kept.
          # With both flavors (cpu + openvino) building in parallel each
          # push, set to 2 → keep just the latest pair, prune everything
          # else. Bump to 4 if you want a one-rollback safety buffer.
          min-versions-to-keep: ${{ fromJSON(env.KEEP_LATEST_N_VERSIONS) }}
          # Protect any release-tagged version (e.g. 1.2.3-cpu, 1.2-openvino)
          # from deletion — those are pinned references users may pull
          # against and shouldn't disappear when a new main-branch build
          # rolls in.
          ignore-versions: '^v?\d+\.\d+(\.\d+)?(-(cpu|openvino))?$'
