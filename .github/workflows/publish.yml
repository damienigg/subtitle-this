name: Publish container images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subtitle-this

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cpu
            dockerfile: Dockerfile
          - flavor: openvino
            dockerfile: Dockerfile.openvino

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space (OpenVINO image is large)
        if: matrix.flavor == 'openvino'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Moving 'cpu' / 'openvino' pointer on the default branch
            type=raw,value=${{ matrix.flavor }},enable={{is_default_branch}}
            # Versioned tags on releases: v1.2.3 -> 1.2.3-cpu / 1.2.3-openvino
            type=semver,pattern={{version}},suffix=-${{ matrix.flavor }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.flavor }}
            # Always-on SHA tag for traceability
            type=sha,prefix=${{ matrix.flavor }}-,format=short
          labels: |
            org.opencontainers.image.title=subtitle-this
            org.opencontainers.image.description=Speech-to-text + LLM translation service for Emby, Jellyfin, and Plex (${{ matrix.flavor }} flavor)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}
